services:
  # Backend Web Service
  - type: web
    name: swift-fix-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false # User will need to provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 18.0.0

  # Frontend Static Site
  - type: web
    name: swift-fix-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: swift-fix-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
